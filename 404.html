<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>الصفحة غير موجودة | ستالايت دمشق</title>
    <link rel="icon" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:Arial,sans-serif;background:#f1f5f9;color:#0f172a;height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
        .error-container{max-width:500px;padding:40px;background:#fff;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
        .error-code{font-size:120px;font-weight:bold;color:#22c55e;margin-bottom:10px;}
        h1{font-size:28px;margin-bottom:15px;color:#0f172a;}
        p{color:#475569;margin-bottom:25px;line-height:1.7;}
        .home-btn{display:inline-block;background:#22c55e;color:#fff;padding:12px 30px;border-radius:40px;text-decoration:none;font-weight:bold;transition:0.3s;}
        .home-btn:hover{background:#16a34a;transform:scale(1.05);}
        .search-box{margin:25px 0;}
        .search-box input{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:40px;outline:none;}
        .search-box input:focus{border-color:#22c55e;}
        @media (max-width:600px){.error-code{font-size:80px;} h1{font-size:22px;}}
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1>⚠️ الصفحة غير موجودة</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير متاحة أو تم نقلها أو حذفها.</p>
        <div class="search-box">
            <input type="text" id="search404" placeholder="ابحث في الموقع...">
        </div>
        <a href="https://dmascussatellite-oss.github.io/damascussatellite/" class="home-btn"><i class="fas fa-home"></i> العودة للرئيسية</a>
    </div>
    <script>
        document.getElementById('search404').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                window.location.href = '/?s=' + encodeURIComponent(this.value);
            }
        });
    </script>
</body>
</html>
